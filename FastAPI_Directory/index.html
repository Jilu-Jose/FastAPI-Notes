<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Iris Prediction</title>
</head>
<body>

    <h1>Iris Prediction</h1>

    <div class="form">

        <input type="number" id="sl" placeholder="Sepal Length">
        <input type="number" id="sw" placeholder="Sepal Width">
        <input type="number" id="pl" placeholder="Petal Length">
        <input type="number" id="pw" placeholder="Petal Width">

        <button onclick="predict()">Predict</button>
    </div>

    <h2 id="result"></h2>
    <script src="./script.js"></script>
</body>
</html>
